{% extends 'base.html' %}
{% load static %}

{% block title %}{{ name }}{% endblock %}
{% block content %}
<h2>{{ name }}</h2>
<ul>
    {% for ingredient in ingredients %}
    <li>{{ ingredient.name }} - {{ ingredient.quantity }}</li>
    {% endfor %}
</ul>
<button><a href="/recipes/list">Go back to the recipe list</a></button>
{% endblock %}
