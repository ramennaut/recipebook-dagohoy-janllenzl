{% extends 'base.html' %}
{% load static %}

{% block title %}{{ name }} Details{% endblock %}
{% block content %}
<h2>{{ name }}</h2>
<ul>
    {% for ingredient in ingredients %}
    <li>{{ ingredient.name }} - {{ ingredient.quantity }}</li>
    {% endfor %}
</ul>
<a href="/recipes/list">Go back to recipe list</a>
{% endblock %}
